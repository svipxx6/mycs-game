<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>魔域传说 · 仓库与个人属性</title>
<style>
:root {
 --bg: #0a0a14; --panel: #1a1a2e; --border: #3a2a1a;
 --gold: #f0c050; --text: #e0d0b0; --red: #f08080;
 --green: #60c060; --blue: #6080f0; --purple: #a060f0;
}
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Microsoft YaHei'; }
body {
 background: var(--bg); color: var(--text);
 min-height: 100vh; padding-bottom: 70px;
 touch-action: manipulation;
}
.game {
 width: 100%; max-width: 480px;
 background: var(--panel); border-radius: 14px; padding: 12px;
 border: 2px solid var(--border);
 margin: 0 auto;
}

/* 顶部 */
.header { text-align: center; border-bottom: 2px solid var(--border); padding-bottom: 10px; margin-bottom: 10px; }
.header h1 { color: var(--gold); font-size: 1.5em; }
.subtitle { color: #a09070; font-size: .8em; }

/* 玩家 */
.player {
 display: flex; gap: 8px; background: rgba(255,255,255,.05);
 border-radius: 8px; padding: 8px; margin-bottom: 10px;
 cursor: pointer;
}
.avatar {
 width: 48px; height: 48px; border-radius: 50%;
 background: linear-gradient(135deg, #3a2a1a, #5a4a3a);
 font-size: 1.5em; display: flex; align-items: center; justify-content: center;
 border: 2px solid var(--gold); flex-shrink: 0;
}
.stats { flex: 1; font-size: .75em; }
.row { display: flex; justify-content: space-between; margin: 1px 0; }
.bar { height: 4px; background: #2a2a3a; border-radius: 2px; overflow: hidden; margin: 1px 0; }
.fill { height: 100%; transition: .3s; }
.hp { background: linear-gradient(90deg, #c04040, #f06060); }
.mp { background: linear-gradient(90deg, #4060c0, #6080f0); }
.exp { background: linear-gradient(90deg, #60c040, #80f060); }

/* 底部菜单 */
.bottom-nav {
 position: fixed; bottom: 0; left: 0; right: 0;
 max-width: 480px; margin: 0 auto;
 height: 60px; background: var(--panel);
 border-top: 2px solid var(--border);
 display: flex; justify-content: space-around;
 align-items: center; z-index: 100;
}
.nav-item {
 text-align: center; font-size: .7em;
 color: #a09070; cursor: pointer;
 padding: 0 5px; position: relative;
}
.nav-item.active { color: var(--gold); }
.nav-icon { font-size: 1.5em; }

/* 下拉菜单 */
.dropdown-menu {
 display: none;
 position: absolute;
 bottom: 70px;
 right: 0;
 background: var(--panel);
 border: 2px solid var(--gold);
 border-radius: 10px;
 padding: 5px 0;
 min-width: 140px;
 z-index: 200;
 box-shadow: 0 0 15px rgba(0,0,0,0.5);
}
.dropdown-menu.show {
 display: block;
}
.dropdown-item {
 padding: 12px 15px;
 font-size: .9em;
 color: var(--text);
 cursor: pointer;
 display: flex;
 align-items: center;
 gap: 8px;
 border-bottom: 1px solid rgba(255,255,255,0.1);
}
.dropdown-item:last-child {
 border-bottom: none;
}
.dropdown-item:hover {
 background: rgba(240,192,80,0.2);
}

/* 主体 */
.main { display: flex; flex-direction: column; gap: 10px; padding-bottom: 70px; }
.panel {
 background: rgba(255,255,255,.04); border-radius: 8px; padding: 8px;
 border: 1px solid var(--border);
}
.panel h3 { color: var(--gold); margin-bottom: 5px; font-size: .9em; }

/* 综合信息面板 */
.chat-panel {
 display: flex;
 flex-direction: column;
 height: 300px;
}
.chat-messages {
 flex: 1;
 overflow-y: auto;
 background: rgba(0,0,0,.3);
 padding: 8px;
 border-radius: 4px;
 margin-bottom: 8px;
 font-size: .75em;
}
.chat-input-area {
 display: flex;
 gap: 8px;
}
.chat-input {
 flex: 1;
 padding: 8px;
 background: rgba(0,0,0,.3);
 border: 1px solid var(--border);
 border-radius: 4px;
 color: var(--text);
 font-size: .8em;
}
.chat-send-btn {
 padding: 8px 12px;
 background: var(--gold);
 color: #000;
 border: none;
 border-radius: 4px;
 cursor: pointer;
 font-weight: bold;
}
.chat-message {
 margin-bottom: 6px;
 padding: 4px 8px;
 border-radius: 4px;
 word-break: break-word;
}
.system-msg { background: rgba(96, 192, 96, 0.2); color: var(--green); }
.player-msg { background: rgba(240, 192, 80, 0.2); color: var(--gold); }
.event-msg { background: rgba(96, 128, 240, 0.2); color: var(--blue); }

/* 按钮 */
.btn {
 padding: 10px 8px; border: none; border-radius: 6px;
 background: linear-gradient(135deg, #5a3a2a, #7a5a3a);
 color: #f0e0b0; font-weight: bold; cursor: pointer; font-size: .8em;
}
.btn:active { transform: scale(.96); }
.btn-primary { background: linear-gradient(135deg, #3a5a2a, #5a7a3a); }
.btn-danger { background: linear-gradient(135deg, #5a2a2a, #7a3a3a); }

.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 6px; }

/* 怪物 */
.monster {
 display: flex; align-items: center; gap: 6px;
 background: rgba(80,30,30,.8); border-radius: 6px; padding: 6px;
 border: 1px solid #a04040; margin-bottom: 4px;
}
.monster .icon { font-size: 1.5em; }
.monster .info { flex: 1; }
.monster .name { color: var(--red); font-weight: bold; font-size: .85em; }

/* 地图卡片 */
.map-card {
 background: rgba(0,0,0,.3); border: 1px solid var(--border);
 border-radius: 8px; padding: 12px; margin-bottom: 8px;
 cursor: pointer; transition: all 0.2s;
}
.map-card:active { transform: scale(0.98); }
.map-card h4 { color: var(--gold); margin-bottom: 5px; }
.map-card p { font-size: .8em; color: #aaa; }

/* 仓库与个人属性面板 */
.modal-overlay {
 display: none;
 position: fixed;
 top: 0; left: 0; right: 0; bottom: 0;
 background: rgba(0,0,0,.8);
 z-index: 1000;
 justify-content: center;
 align-items: center;
}
.modal-overlay.show {
 display: flex;
}
.modal-content {
 background: var(--panel);
 border: 2px solid var(--gold);
 border-radius: 12px;
 width: 90%;
 max-width: 450px;
 max-height: 80vh;
 overflow-y: auto;
 padding: 15px;
}
.modal-header {
 display: flex;
 justify-content: space-between;
 align-items: center;
 margin-bottom: 15px;
 padding-bottom: 10px;
 border-bottom: 1px solid var(--border);
}
.modal-title {
 color: var(--gold);
 font-size: 1.2em;
 font-weight: bold;
}
.close-btn {
 background: none;
 border: none;
 color: var(--text);
 font-size: 1.5em;
 cursor: pointer;
 padding: 0 5px;
}
.modal-body {
 font-size: .85em;
}
/* 属性面板 */
.attr-grid {
 display: grid;
 grid-template-columns: 1fr 1fr;
 gap: 10px;
 margin-bottom: 15px;
}
.attr-item {
 background: rgba(0,0,0,.2);
 padding: 8px;
 border-radius: 6px;
 border: 1px solid rgba(255,255,255,.1);
}
.attr-label {
 color: #aaa;
 font-size: .9em;
 margin-bottom: 3px;
}
.attr-value {
 color: var(--gold);
 font-weight: bold;
 font-size: 1.1em;
}
/* 装备槽位 */
.equip-slots {
 display: grid;
 grid-template-columns: repeat(4, 1fr);
 gap: 8px;
 margin-top: 10px;
}
.equip-slot {
 background: rgba(0,0,0,.3);
 border: 1px dashed rgba(255,255,255,.2);
 border-radius: 8px;
 aspect-ratio: 1;
 display: flex;
 flex-direction: column;
 align-items: center;
 justify-content: center;
 cursor: pointer;
 transition: all 0.2s;
}
.equip-slot:hover {
 background: rgba(240,192,80,.1);
 border-color: var(--gold);
}
.equip-slot.equipped {
 border-style: solid;
 border-color: var(--gold);
 background: rgba(240,192,80,.05);
}
.equip-icon {
 font-size: 1.5em;
 margin-bottom: 3px;
}
.equip-name {
 font-size: .7em;
 color: #aaa;
 text-align: center;
}
/* 仓库网格 */
.storage-grid {
 display: grid;
 grid-template-columns: repeat(5, 1fr);
 gap: 8px;
 margin-top: 10px;
}
.storage-slot {
 background: rgba(0,0,0,.3);
 border: 1px solid rgba(255,255,255,.1);
 border-radius: 6px;
 aspect-ratio: 1;
 display: flex;
 flex-direction: column;
 align-items: center;
 justify-content: center;
 cursor: pointer;
 position: relative;
}
.storage-slot:hover {
 background: rgba(240,192,80,.1);
}
.storage-slot .count {
 position: absolute;
 bottom: 2px;
 right: 2px;
 font-size: .7em;
 color: var(--gold);
 background: rgba(0,0,0,.5);
 padding: 0 3px;
 border-radius: 3px;
}
</style>
</head>
<body>
<div class="game">
 <div class="header">
  <h1>⚔️ 魔域传说</h1>
  <div class="subtitle">手机专版 · 仓库与个人属性</div>
 </div>

 <div class="player" onclick="openPlayerModal()">
  <div class="avatar" id="avatar">🧙</div>
  <div class="stats">
   <div class="row"><span id="pName">冒险者</span> Lv.<span id="pLevel">1</span></div>
   <div class="row">❤️ <span id="pHp">100</span>/<span id="pMaxHp">100</span></div>
   <div class="bar"><div class="fill hp" id="hpBar"></div></div>
   <div class="row">💧 <span id="pMp">50</span>/<span id="pMaxMp">50</span></div>
   <div class="bar"><div class="fill mp" id="mpBar"></div></div>
   <div class="row">⚔️ <span id="pAtk">15</span> 🛡️ <span id="pDef">8</span> 💰 <span id="pGold">100</span></div>
  </div>
 </div>

 <!-- 底部菜单 -->
 <div class="bottom-nav">
  <div class="nav-item active" data-tab="city"><div class="nav-icon">🏰</div>主城</div>
  <div class="nav-item" data-tab="explore"><div class="nav-icon">🗺️</div>地图</div>
  <div class="nav-item" data-tab="bag"><div class="nav-icon">🎒</div>背包</div>
  <div class="nav-item" data-tab="mount"><div class="nav-icon">🐎</div>坐骑</div>
  
  <!-- 右下角菜单按钮 -->
  <div class="nav-item menu-container" onclick="toggleDropdown()">
   <div class="nav-icon">🔄</div>
   <div class="nav-text">菜单</div>
   
   <!-- 下拉菜单 -->
   <div class="dropdown-menu" id="dropdownMenu">
    <div class="dropdown-item" onclick="jobPanel()">⚔️ 转职系统</div>
    <div class="dropdown-item" onclick="autoPanel()">🤖 自动挂机</div>
    <div class="dropdown-item" onclick="showSettings()">⚙️ 设置</div>
   </div>
  </div>
 </div>

 <div class="main">
  <div class="panel">
   <div id="content" class="scroll"></div>
   <div id="actions" class="grid2"></div>
  </div>
  
  <!-- 综合信息面板 -->
  <div class="panel chat-panel">
   <h3>📜 综合信息</h3>
   <div class="chat-messages" id="chatMessages">
    <!-- 消息会动态添加到这里 -->
   </div>
   <div class="chat-input-area">
    <input type="text" class="chat-input" id="chatInput" placeholder="输入消息..." maxlength="100">
    <button class="chat-send-btn" onclick="sendMessage()">发送</button>
   </div>
  </div>
 </div>
</div>

<!-- 个人属性与装备模态框 -->
<div class="modal-overlay" id="playerModal">
 <div class="modal-content">
  <div class="modal-header">
   <div class="modal-title">👤 个人属性</div>
   <button class="close-btn" onclick="closePlayerModal()">×</button>
  </div>
  <div class="modal-body">
   <div class="attr-grid" id="attrGrid">
    <!-- 属性会通过JS动态填充 -->
   </div>
   <h4 style="color:var(--gold); margin-bottom:10px;">⚔️ 装备栏</h4>
   <div class="equip-slots" id="equipSlots">
    <!-- 装备槽位会通过JS动态填充 -->
   </div>
  </div>
 </div>
</div>

<!-- 仓库模态框 -->
<div class="modal-overlay" id="storageModal">
 <div class="modal-content">
  <div class="modal-header">
   <div class="modal-title">📦 仓库</div>
   <button class="close-btn" onclick="closeStorageModal()">×</button>
  </div>
  <div class="modal-body">
   <div style="margin-bottom:15px; color:#aaa; font-size:.9em;">
    仓库容量：<span id="storageCount">0</span>/20
   </div>
   <div class="storage-grid" id="storageGrid">
    <!-- 仓库格子会通过JS动态填充 -->
   </div>
  </div>
 </div>
</div>

<script>
/* ================= 数据 ================= */
const G = {
 player: { name: "冒险者", level: 1, exp: 0, maxExp: 100, hp: 100, maxHp: 100, mp: 50, maxMp: 50, atk: 15, def: 8, gold: 100, job: 0, mount: 0, guild: null },
 equip: { weapon: null, armor: null, helmet: null, boots: null, accessory: null },
 bag: [
  { id: 1, name: "小红药水", icon: "🧪", type: "consume", effect: "heal", value: 30, count: 5 },
  { id: 2, name: "小蓝药水", icon: "🔮", type: "consume", effect: "mana", value: 20, count: 3 },
  { id: 3, name: "木剑", icon: "🪵", type: "weapon", atk: 5 },
  { id: 4, name: "布甲", icon: "👕", type: "armor", def: 3 }
 ],
 storage: [], // 仓库
 mounts: [
  { id: 0, name: "无", icon: "🚶", speed: 0, atk: 0, def: 0, owned: true },
  { id: 1, name: "战马", icon: "🐎", speed: 10, atk: 5, def: 3, owned: false, price: 200 },
  { id: 2, name: "飞龙", icon: "🐉", speed: 20, atk: 10, def: 5, owned: false, price: 500 }
 ],
 jobs: [
  { id: 0, name: "初心者", desc: "未转职", req: 0, skill: null, atkBonus: 0, defBonus: 0 },
  { id: 1, name: "狂战士", desc: "高攻击力", req: 10, skill: "狂暴斩", atkBonus: 20, defBonus: 5 },
  { id: 2, name: "大魔导师", desc: "高魔法攻击", req: 10, skill: "陨石术", atkBonus: 15, mpBonus: 30 }
 ],
 auto: { enabled: false, interval: null },
 mobs: [
  { id: 0, name: "哥布林", icon: "👹", hp: 30, atk: 8, def: 2, exp: 10, gold: 5 },
  { id: 1, name: "史莱姆", icon: "🫧", hp: 20, atk: 5, def: 1, exp: 8, gold: 3 },
  { id: 2, name: "骷髅兵", icon: "💀", hp: 50, atk: 12, def: 5, exp: 20, gold: 10 }
 ],
 maps: [
  { id: 0, name: "迷雾森林", desc: "常年被迷雾笼罩，常有低阶魔物出没。", mobs: [0, 1] },
  { id: 1, name: "幽暗墓穴", desc: "亡灵的安息之地，传闻有强大的不死生物守护。", mobs: [2] }
 ],
 messages: [],
 guilds: [
  { id: 1, name: "龙腾公会", level: 5, members: 120, wealth: 50000 },
  { id: 2, name: "凤鸣公会", level: 4, members: 95, wealth: 35000 },
  { id: 3, name: "虎啸公会", level: 6, members: 150, wealth: 75000 }
 ]
};

/* ================= UI ================= */
const $ = id => document.getElementById(id);
const C = $("content"), A = $("actions"), CM = $("chatMessages");

function ui() {
 const p = G.player;
 $("pLevel").textContent = p.level;
 $("pHp").textContent = p.hp; $("pMaxHp").textContent = p.maxHp;
 $("pMp").textContent = p.mp; $("pMaxMp").textContent = p.maxMp;
 $("pAtk").textContent = p.atk + (G.equip.weapon?.atk || 0) + (G.mounts[p.mount].atk || 0);
 $("pDef").textContent = p.def + (G.equip.armor?.def || 0) + (G.mounts[p.mount].def || 0);
 $("pGold").textContent = p.gold;
 $("hpBar").style.width = p.hp / p.maxHp * 100 + "%";
 $("mpBar").style.width = p.mp / p.maxMp * 100 + "%";
}

/* ================= 消息系统 ================= */
function addMessage(message, type = 'system') {
 const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
 G.messages.push({ time, message, type });
 displayMessages();
}

function displayMessages() {
 CM.innerHTML = '';
 G.messages.forEach(msg => {
  const div = document.createElement('div');
  div.className = `chat-message ${msg.type}-msg`;
  div.textContent = `[${msg.time}] ${msg.message}`;
  CM.appendChild(div);
 });
 CM.scrollTop = CM.scrollHeight;
}

function sendMessage() {
 const input = $('chatInput');
 const message = input.value.trim();
 if (!message) return;
 
 addMessage(`${G.player.name}: ${message}`, 'player');
 input.value = '';
}

// 允许按Enter键发送消息
$('chatInput').addEventListener('keypress', function(e) {
 if (e.key === 'Enter') {
  sendMessage();
 }
});

/* ================= 下拉菜单 ================= */
function toggleDropdown() {
 const dropdown = $("dropdownMenu");
 dropdown.classList.toggle("show");
}

// 点击其他地方关闭下拉菜单
document.addEventListener("click", function(event) {
 const dropdown = $("dropdownMenu");
 const menuBtn = document.querySelector(".menu-container");
 if (!dropdown.contains(event.target) && !menuBtn.contains(event.target)) {
  dropdown.classList.remove("show");
 }
});

/* ================= 底部菜单 ================= */
document.querySelectorAll(".bottom-nav .nav-item").forEach(btn => {
 if (!btn.classList.contains("menu-container")) {
  btn.onclick = () => {
   document.querySelectorAll(".bottom-nav .nav-item").forEach(x => x.classList.remove("active"));
   btn.classList.add("active");
   tab(btn.dataset.tab);
  };
 }
});

function tab(t) {
 C.innerHTML = ""; A.innerHTML = "";
 if (t === "explore") explore();
 if (t === "city") city();
 if (t === "bag") bag();
 if (t === "mount") mountPanel();
}

/* ================= 主城（默认进入） ================= */
function city() {
 C.innerHTML = "<h3>🏰 主城</h3>";
 C.innerHTML += `<div class="map-card" onclick="visitShop()"><h4>🏪 商店</h4><p>购买装备和药水</p></div>`;
 C.innerHTML += `<div class="map-card" onclick="guildPanel()"><h4>🏯 公会</h4><p>进入公会领地</p></div>`;
 C.innerHTML += `<div class="map-card" onclick="openStorageModal()"><h4>📦 仓库</h4><p>存取物品</p></div>`;
}

/* ================= 个人属性与装备模态框 ================= */
function openPlayerModal() {
 $('playerModal').classList.add('show');
 renderPlayerModal();
}

function closePlayerModal() {
 $('playerModal').classList.remove('show');
}

function renderPlayerModal() {
 const p = G.player;
 const attrGrid = $('attrGrid');
 
 // 计算总攻击和防御（包括装备和坐骑加成）
 const totalAtk = p.atk + (G.equip.weapon?.atk || 0) + (G.mounts[p.mount].atk || 0);
 const totalDef = p.def + (G.equip.armor?.def || 0) + (G.mounts[p.mount].def || 0);
 
 attrGrid.innerHTML = `
  <div class="attr-item">
   <div class="attr-label">等级</div>
   <div class="attr-value">Lv.${p.level}</div>
  </div>
  <div class="attr-item">
   <div class="attr-label">职业</div>
   <div class="attr-value">${G.jobs[p.job].name}</div>
  </div>
  <div class="attr-item">
   <div class="attr-label">生命值</div>
   <div class="attr-value">${p.hp}/${p.maxHp}</div>
  </div>
  <div class="attr-item">
   <div class="attr-label">魔法值</div>
   <div class="attr-value">${p.mp}/${p.maxMp}</div>
  </div>
  <div class="attr-item">
   <div class="attr-label">攻击力</div>
   <div class="attr-value">${totalAtk}</div>
  </div>
  <div class="attr-item">
   <div class="attr-label">防御力</div>
   <div class="attr-value">${totalDef}</div>
  </div>
  <div class="attr-item">
   <div class="attr-label">金币</div>
   <div class="attr-value">${p.gold}</div>
  </div>
  <div class="attr-item">
   <div class="attr-label">经验值</div>
   <div class="attr-value">${p.exp}/${p.maxExp}</div>
  </div>
 `;
 
 // 渲染装备槽位
 const equipSlots = $('equipSlots');
 const slots = [
  { key: 'weapon', name: '武器', icon: '⚔️' },
  { key: 'armor', name: '护甲', icon: '🛡️' },
  { key: 'helmet', name: '头盔', icon: '⛑️' },
  { key: 'boots', name: '靴子', icon: '👢' },
  { key: 'accessory', name: '饰品', icon: '💍' }
 ];
 
 equipSlots.innerHTML = '';
 slots.forEach(slot => {
  const item = G.equip[slot.key];
  const slotEl = document.createElement('div');
  slotEl.className = `equip-slot ${item ? 'equipped' : ''}`;
  slotEl.innerHTML = `
   <div class="equip-icon">${item ? item.icon : slot.icon}</div>
   <div class="equip-name">${item ? item.name : slot.name}</div>
  `;
  slotEl.onclick = () => unequipItem(slot.key);
  equipSlots.appendChild(slotEl);
 });
}

function unequipItem(slotKey) {
 const item = G.equip[slotKey];
 if (!item) return;
 
 // 检查背包是否有空位
 if (G.bag.length >= 20) {
  addMessage("背包已满，无法卸下装备！", 'system');

 // 卸下装备到背包

/* ================= 仓库模态框 ================= */
function openStorageModal() {
 $('storageModal').classList.add('show');
 renderStorageModal();
}

function closeStorageModal() {
 $('storageModal').classList.remove('show');
}

function renderStorageModal() {
 const storageCount = $('storageCount');
 storageCount.textContent = G.storage.length;
 
 const storageGrid = $('storageGrid');
 storageGrid.innerHTML = '';
 
 // 创建20个仓库格子
 for (let i = 0; i < 20; i++) {
  const slot = document.createElement('div');
  slot.className = 'storage-slot';
  
  if (i < G.storage.length) {
   const item = G.storage[i];
   slot.innerHTML = `
    <div style="font-size:1.5em;">${item.icon}</div>
    <div style="font-size:.7em; text-align:center;">${item.name}</div>
    ${item.count ? `<div class="count">x${item.count}</div>` : ''}
   `;
   slot.onclick = () => takeFromStorage(i);
  } else {
   slot.innerHTML = `<div style="color:#666; font-size:.8em;">空</div>`;
  }
  
  storageGrid.appendChild(slot);
 }
}

function takeFromStorage(index) {
 const item = G.storage[index];
 if (!item) return;
 
 // 检查背包是否有空位
 if (G.bag.length >= 20) {
  addMessage("背包已满，无法取出物品！", 'system');
  return;
 }
 
 // 从仓库取出到背包
 G.storage.splice(index, 1);
 G.bag.push(item);
 addMessage(`从仓库取出了${item.name}`, 'system');
 renderStorageModal();
 bag(); // 刷新背包界面
}

/* ================= 战斗 ================= */
function fight(id) {
 const m = G.mobs[id];
 addMessage(`遭遇${m.name}`, 'event');
 const battle = setInterval(() => {
  const dmg = Math.max(1, G.player.atk + (G.equip.weapon?.atk || 0) + (G.mounts[G.player.mount].atk || 0) - m.def);
  m.hp -= dmg;
  addMessage(`造成${dmg}伤害`, 'event');
  if (m.hp <= 0) {
   clearInterval(battle);
   addMessage(`胜利！+${m.exp}EXP +${m.gold}金`, 'system');
   G.player.exp += m.exp; G.player.gold += m.gold;
   checkLevel();
   ui();
   return;
  }
  const mdmg = Math.max(1, m.atk - (G.player.def + (G.equip.armor?.def || 0) + (G.mounts[G.player.mount].def || 0)));
  G.player.hp -= mdmg;
  addMessage(`受到${mdmg}伤害`, 'event');
  if (G.player.hp <= 0) {
   clearInterval(battle);
   addMessage("战败！", 'event');
   G.player.hp = G.player.maxHp;
   G.player.mp = G.player.maxMp;
   ui();
  }
  ui();
 }, 800);
}

function checkLevel() {
 while (G.player.exp >= G.player.maxExp) {
  G.player.exp -= G.player.maxExp;
  G.player.level++;
  G.player.maxHp += 20; G.player.maxMp += 10;
  G.player.atk += 3; G.player.def += 2;
  addMessage(`升级 Lv.${G.player.level}`, 'system');
 }
}

function buyItem(id) {
 const items = [
  { id: 101, name: "生命药水", icon: "🧪", price: 20, type: "consume", effect: "heal", value: 30 },
  { id: 102, name: "铁剑", icon: "⚔️", price: 80, type: "weapon", atk: 8 }
 ];
 const item = items.find(i => i.id === id);
 if (G.player.gold >= item.price) {
  G.player.gold -= item.price;
  if (item.type === "consume") {
   const existing = G.bag.find(i => i.id === item.id);
   if (existing) existing.count++;
   else G.bag.push({...item, count: 1});
  } else {
   G.bag.push({...item});
  }
  addMessage(`购买${item.name}`, 'system');
  ui();
 } else {
  addMessage("金币不足", 'system');
 }
}

/* ================= 背包 ================= */
function bag() {
 C.innerHTML = "<h3>🎒 背包</h3>";
 G.bag.forEach((item, i) => {
  C.innerHTML += `<div class="monster" onclick="useItem(${i})">
   <div class="icon">${item.icon}</div>
   <div class="info"><div class="name">${item.name}</div></div>
   <div>x${item.count || 1}</div>
  </div>`;
 });
}

function useItem(i) {
 const item = G.bag[i];
 if (item.type === "consume") {
  if (item.effect === "heal") {
   G.player.hp = Math.min(G.player.maxHp, G.player.hp + item.value);
   addMessage(`恢复${item.value}HP`, 'system');
  }
  item.count--;
  if (item.count <= 0) G.bag.splice(i, 1);
 } else {
  // 装备物品
  if (item.type === "weapon") {
   if (G.equip.weapon) G.bag.push(G.equip.weapon);
   G.equip.weapon = item;
  } else if (item.type === "armor") {
   if (G.equip.armor) G.bag.push(G.equip.armor);
   G.equip.armor = item;
  }
  G.bag.splice(i, 1);
  addMessage(`装备${item.name}`, 'system');
 }
 ui();
 bag();
}

}

/* ================= 自动挂机 ================= */
function autoPanel() {
 C.innerHTML = "<h3>🤖 自动挂机</h3>";
 const on = G.auto.enabled;
 C.innerHTML += `<div style="text-align:center; margin:10px 0;">
  <button class="btn ${on ? 'btn-danger' : 'btn-primary'}" onclick="toggleAuto()">
   ${on ? '停止' : '开始'}
  </button>
 </div>`;
}

function toggleAuto() {
 if (G.auto.enabled) {
  clearInterval(G.auto.interval);
  G.auto.enabled = false;
  addMessage("挂机停止", 'system');
 } else {
  G.auto.enabled = true;
  G.auto.interval = setInterval(() => {
   if (G.player.hp <= 20) {
    const pot = G.bag.find(i => i.effect === "heal");
    if (pot && pot.count > 0) {
     G.player.hp = Math.min(G.player.maxHp, G.player.hp + pot.value);
     pot.count--;
     addMessage("自动喝药", 'system');
    }
   }
   const mob = G.mobs[0];
   const dmg = Math.max(1, G.player.atk + (G.equip.weapon?.atk || 0) - mob.def);
   mob.hp -= dmg;
   if (mob.hp <= 0) {
    addMessage("挂机胜利", 'system');
    G.player.gold += mob.gold;
    G.player.exp += mob.exp;
    mob.hp = G.mobs[0].hp;
    checkLevel();
   }
   ui();
  }, 1500);
  addMessage("挂机开始", 'system');
 }
 autoPanel();
 ui();
}
